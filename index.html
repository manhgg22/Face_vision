<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceID Pro - Intelligence Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 999px;
            color: var(--success);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        #preview-container {
            position: relative;
            display: none;
            max-width: 100%;
            margin: 0 auto;
        }

        #preview {
            max-width: 100%;
            max-height: 350px;
            border-radius: 12px;
            display: block;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

        #remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--error);
            color: white;
            border: 2px solid var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        #remove-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .url-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: var(--gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #progress-container {
            display: none;
            margin-top: 24px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gradient);
            transition: width 0.4s ease-out;
        }

        #result-area {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.25);
            display: none;
        }

        .match-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .name {
            font-weight: 600;
            color: #fff;
        }

        .distance-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 8px;
        }

        .db-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>FaceID Intelligence</h1>
            <div class="status-badge">ONLINE ✓</div>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>🔍 Nhận diện khuôn mặt</h2>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px;">
                    Mẹo: Nhấn <b>Ctrl + V</b> để dán ảnh đã copy!
                </p>

                <div class="upload-area" id="drop-zone">
                    <div id="upload-prompt">
                        <p>Kéo thả ảnh hoặc click để chọn</p>
                    </div>
                    <div id="preview-container">
                        <div id="remove-btn" title="Xóa ảnh này">✕</div>
                        <img id="preview" alt="Preview">
                    </div>
                    <input type="file" id="file-input" hidden accept="image/*">
                </div>

                <div class="url-input-container">
                    <input type="text" id="url-input" class="input-field" placeholder="Dán URL ảnh...">
                    <button id="url-btn" class="btn">Tải ảnh</button>
                </div>

                <button id="find-btn" class="btn" style="width: 100%; padding: 16px; font-size: 1.1rem;" disabled>Bắt
                    đầu phân tích</button>

                <div id="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div
                        style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim);">
                        <span id="status-message">Đang xử lý...</span>
                        <span id="percentage-text">0%</span>
                    </div>
                </div>

                <div id="result-area"></div>
            </div>

            <div class="card">
                <h2>📁 Database</h2>
                <div id="db-list"></div>
                <button onclick="purgeCache()" class="btn"
                    style="margin-top: 20px; width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1);">Clear
                    Cache</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('preview-container');
        const uploadPrompt = document.getElementById('upload-prompt');
        const removeBtn = document.getElementById('remove-btn');
        const findBtn = document.getElementById('find-btn');
        const resultArea = document.getElementById('result-area');
        const progressFill = document.getElementById('progress-fill');
        const statusMsg = document.getElementById('status-message');
        const percentText = document.getElementById('percentage-text');
        let selectedFile = null;

        // --- PASTE SUPPORT ---
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    handleFile(items[i].getAsFile());
                }
            }
        });

        // --- URL SUPPORT ---
        document.getElementById('url-btn').onclick = async () => {
            const url = document.getElementById('url-input').value;
            if (!url) return;
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                handleFile(new File([blob], "url_image.jpg", { type: blob.type }));
            } catch (err) { alert("Lỗi tải ảnh từ URL."); }
        };

        document.getElementById('drop-zone').onclick = (e) => {
            if (e.target !== removeBtn) fileInput.click();
        };

        removeBtn.onclick = (e) => {
            e.stopPropagation();
            resetUpload();
        };

        function resetUpload() {
            selectedFile = null;
            preview.src = '';
            previewContainer.style.display = 'none';
            uploadPrompt.style.display = 'block';
            findBtn.disabled = true;
            resultArea.style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
        }

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                previewContainer.style.display = 'block';
                uploadPrompt.style.display = 'none';
                findBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        findBtn.onclick = async () => {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append('image', selectedFile);
            findBtn.disabled = true;
            document.getElementById('progress-container').style.display = 'block';
            let progress = 0;
            const interval = setInterval(() => {
                if (progress < 90) {
                    progress += (90 - progress) * 0.1;
                    progressFill.style.width = progress + '%';
                    percentText.innerText = Math.round(progress) + '%';
                }
            }, 200);

            try {
                const res = await fetch('/find', { method: 'POST', body: formData });
                const data = await res.json();
                clearInterval(interval);
                progressFill.style.width = '100%';
                percentText.innerText = '100%';
                showResults(data);
            } finally { findBtn.disabled = false; }
        };

        function showResults(data) {
            resultArea.style.display = 'block';
            if (data.success && data.match_count > 0) {
                let html = '<strong>KẾT QUẢ:</strong><br>';
                data.results.forEach(matches => {
                    matches.forEach(m => {
                        html += `<div class="match-item"><span class="name">${m.name}</span><span class="distance-badge">${((1 - m.distanc e ) * 100).toFixed(1)
            }% Match</span ></div > `;
                    });
                });
                resultArea.innerHTML = html;
            } else { resultArea.innerHTML = 'Không tìm thấy ai khớp.'; }
        }

        let isIndexing = false;
        
        async function checkStatus() {
            try {
                const res = await fetch('/db/status');
                const data = await res.json();
                isIndexing = data.is_indexing;
                
                const banner = document.getElementById('global-indexing-banner');
                if (isIndexing) {
                    if (!banner) {
                        const b = document.createElement('div');
                        b.id = 'global-indexing-banner';
                        b.innerHTML = '⚙️ Đang đồng bộ Database ở chế độ chạy ngầm... Vui lòng đợi trong giây lát.';
                        b.style.cssText = 'background: #fbbf24; color: #000; text-align: center; padding: 10px; font-weight: 600; width: 100%; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: pulse 2s infinite;';
                        document.querySelector('header').insertAdjacentElement('afterend', b);
                    }
                    findBtn.disabled = true;
                    findBtn.innerText = "Đang đồng bộ dữ liệu...";
                } else {
                    if (banner) banner.remove();
                    findBtn.innerText = "Bắt đầu phân tích";
                    if (selectedFile) findBtn.disabled = false;
                }
            } catch(e) {}
        }
        
        setInterval(checkStatus, 2000);
        checkStatus();

        async function fetchDB() {
            const res = await fetch('/db/list');
            const data = await res.json();
            let html = '';
            for (const [name, files] of Object.entries(data.identities)) {
                let badge = `<span>${files.length} ảnh</span>`;
                if (files.length > 3) {
                    badge = `<span style="color: #fbbf24; font-size: 0.8rem;" title="Quá nhiều ảnh sẽ làm chậm AI. Hãy chỉ giữ 2-3 ảnh rõ nhất.">⚠️ ${files.length} ảnh (Nên giảm bớt)</span>`;
                }
                html += `<div class="db-item"><span>${name}</span>${badge}</div>`;
            }
            document.getElementById('db-list').innerHTML = html;
        }
        
        async function purgeCache() {
            if (!confirm("Bấm OK để dọn dẹp và xây dựng lại toàn bộ Index. Hệ thống sẽ tự động làm ngầm!")) return;
            await fetch('/db/purge-cache');
            fetchDB();
            checkStatus(); // Cập nhật UI ngay lập tức
        }
        fetchDB();
    </script>
</body>

</html>
