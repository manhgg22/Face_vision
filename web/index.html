<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceID Pro - Intelligence Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 999px;
            color: var(--success);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(1.01);
        }

        #preview-container {
            position: relative;
            display: none;
            width: 100%;
        }

        #preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

        #remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--error);
            color: white;
            border: 2px solid var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 20;
            transition: 0.2s;
        }

        #remove-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--gradient);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Progress Container --- */
        #progress-container {
            display: none;
            margin-top: 24px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gradient);
            transition: width 0.4s ease-out;
            box-shadow: 0 0 10px var(--primary);
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        #status-message {
            font-weight: 500;
            color: var(--primary-light);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        #result-area {
            margin-top: 24px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.25);
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .match-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .distance-badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .db-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .db-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .count-badge {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>FaceID Intelligence</h1>
            <div class="status-badge">
                <span
                    style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 8px;"></span>
                Hệ thống đang sẵn sàng
            </div>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>🔍 Nhận diện danh tính</h2>
                <div class="upload-area" id="drop-zone">
                    <div id="upload-prompt">
                        <p style="font-size: 1.2rem; margin-bottom: 10px;">Thả ảnh vào đây hoặc Click</p>
                        <p style="color: var(--text-dim); font-size: 0.9rem;">Hỗ trợ JPG, PNG, WEBP</p>
                    </div>
                    <div id="preview-container">
                        <div id="remove-btn" title="Xóa ảnh">✕</div>
                        <img id="preview" alt="Preview">
                    </div>
                    <input type="file" id="file-input" hidden accept="image/*">
                </div>

                <button id="find-btn" class="btn" disabled>Bắt đầu phân tích</button>

                <div id="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="status-message">Đang khởi tạo AI...</span>
                        <span id="percentage-text">0%</span>
                    </div>
                </div>

                <div id="result-area"></div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px;">📁 Danh sách Database</h2>
                <div id="db-list" style="max-height: 500px; overflow-y: auto; padding-right: 5px;">
                    <p style="text-align: center; color: var(--text-dim);">Đang tải dữ liệu...</p>
                </div>
                <div style="margin-top: 24px;">
                    <button onclick="purgeCache()" class="btn"
                        style="background: transparent; border: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem;">
                        🔄 Làm mới bộ nhớ đệm (Clear Cache)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('preview-container');
        const uploadPrompt = document.getElementById('upload-prompt');
        const removeBtn = document.getElementById('remove-btn');
        const findBtn = document.getElementById('find-btn');
        const resultArea = document.getElementById('result-area');
        const dbList = document.getElementById('db-list');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const statusMsg = document.getElementById('status-message');
        const percentText = document.getElementById('percentage-text');

        const STATUS_MESSAGES = [
            "Đang tải ảnh lên máy chủ...",
            "Đang dò tìm khuôn mặt (RetinaFace)...",
            "Đang trích xuất đặc trưng AI...",
            "Đang đối soát cơ sở dữ liệu...",
            "Đang tính toán độ trùng khớp...",
            "Sắp hoàn tất..."
        ];

        dropZone.onclick = (e) => {
            if (e.target !== removeBtn) fileInput.click();
        };

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                previewContainer.style.display = 'block';
                uploadPrompt.style.display = 'none';
                findBtn.disabled = false;
                resultArea.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        removeBtn.onclick = (e) => {
            e.stopPropagation();
            fileInput.value = "";
            preview.src = "";
            previewContainer.style.display = 'none';
            uploadPrompt.style.display = 'block';
            findBtn.disabled = true;
            resultArea.style.display = 'none';
        };

        let progressInterval;
        function startFakeProgress() {
            progressContainer.style.display = 'block';
            let progress = 0;
            let messageIdx = 0;

            progressFill.style.width = '0%';
            percentText.innerText = '0%';
            statusMsg.innerText = STATUS_MESSAGES[0];

            progressInterval = setInterval(() => {
                if (progress < 90) {
                    // Slows down as it gets higher
                    const inc = progress < 50 ? 5 : (progress < 80 ? 2 : 0.5);
                    progress += inc;
                    progressFill.style.width = progress + '%';
                    percentText.innerText = Math.round(progress) + '%';

                    // Rotate messages
                    if (progress % 15 < 1) {
                        messageIdx = Math.min(messageIdx + 1, STATUS_MESSAGES.length - 1);
                        statusMsg.innerText = STATUS_MESSAGES[messageIdx];
                    }
                }
            }, 150);
        }

        function finishProgress() {
            clearInterval(progressInterval);
            progressFill.style.width = '100%';
            percentText.innerText = '100%';
            statusMsg.innerText = 'Hoàn tất!';
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 500);
        }

        findBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            findBtn.disabled = true;
            resultArea.style.display = 'none';
            startFakeProgress();

            try {
                const response = await fetch('/find', { method: 'POST', body: formData });
                const data = await response.json();
                showResults(data);
            } catch (err) {
                resultArea.innerHTML = `<p style="color: var(--error)">Lỗi kết nối: ${err.message}</p>`;
                resultArea.style.display = 'block';
            } finally {
                finishProgress();
                findBtn.disabled = false;
            }
        };

        function showResults(data) {
            resultArea.style.display = 'block';

            // Handle error cases
            if (!data.success) {
                if (data.error === "NO_FACE_DETECTED") {
                    resultArea.innerHTML = `
                        <div style="text-align: center; padding: 20px;">
                            <div style="font-size: 3rem; margin-bottom: 10px;">⚠️</div>
                            <p style="color: var(--error); font-weight: 600; font-size: 1.1rem; margin-bottom: 10px;">
                                Không phát hiện khuôn mặt
                            </p>
                            <p style="color: var(--text-dim); font-size: 0.9rem;">
                                ${data.message || 'Vui lòng sử dụng ảnh có khuôn mặt rõ ràng'}
                            </p>
                        </div>
                    `;
                } else {
                    resultArea.innerHTML = `
                        <p style="color: var(--error); text-align: center;">
                            ❌ Lỗi: ${data.message || 'Đã xảy ra lỗi không xác định'}
                        </p>
                    `;
                }
                return;
            }

            if (data.success && data.match_count > 0 && data.results.length > 0) {
                // Get the best match
                const bestMatch = data.results[0];
                const confidence = ((1 - bestMatch.distance) * 100).toFixed(1);

                let html = '<div style="margin-bottom:15px; font-weight:600; color:var(--text-dim)">KẾT QUẢ PHÂN TÍCH:</div>';
                html += `
                    <div class="match-item" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);">
                        <span class="name" style="font-size: 1.3rem;">👤 ${bestMatch.name}</span>
                        <span class="distance-badge" style="font-size: 1.1rem; padding: 8px 16px;">${confidence}% Match</span>
                    </div>
                `;

                // Show additional info
                html += `
                    <div style="margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 0.85rem; color: var(--text-dim);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                            <span>Distance Score:</span>
                            <span style="font-family: monospace;">${bestMatch.distance.toFixed(4)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between;">
                            <span>Processing Time:</span>
                            <span>${data.debug_info?.elapsed_seconds || 'N/A'}s</span>
                        </div>
                    </div>
                `;

                resultArea.innerHTML = html;
            } else if (data.best_candidate && data.best_candidate.name !== "None") {
                const conf = ((1 - data.best_candidate.distance) * 100).toFixed(1);
                resultArea.innerHTML = `
                    <p style="text-align: center; color: var(--text-dim); margin-bottom:15px;">Không tìm thấy kết quả khớp hoàn toàn.</p>
                    <div style="padding: 16px; background: rgba(255,255,255,0.05); border-radius: 16px;">
                        <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom:10px;">Gần giống nhất:</p>
                        <div class="match-item">
                            <span class="name" style="color: var(--text-dim)">${data.best_candidate.name}</span>
                            <span class="distance-badge" style="background:rgba(255,255,255,0.1); color:var(--text-dim)">${conf}%</span>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = '<p style="text-align: center; color:var(--text-dim)">Không thể nhận diện bất kỳ khuôn mặt nào trong ảnh này.</p>';
            }
        }

        async function fetchDB() {
            try {
                const response = await fetch('/db/list');
                const data = await response.json();
                let html = '';
                for (const [name, files] of Object.entries(data.identities)) {
                    html += `
                        <div class="db-item">
                            <span style="font-weight:500;">${name}</span>
                            <span class="count-badge">${files.length} items</span>
                        </div>
                    `;
                }
                dbList.innerHTML = html || '<p style="text-align:center">Database trống</p>';
            } catch (err) {
                dbList.innerHTML = 'Lỗi tải DB';
            }
        }

        async function purgeCache() {
            if (!confirm('Xóa bộ nhớ đệm sẽ khiến hệ thống quét lại toàn bộ Database trong lần tới. Bạn muốn tiếp tục?')) return;
            await fetch('/db/purge-cache');
            fetchDB();
            alert('Đã xóa cache thành công!');
        }

        fetchDB();
    </script>
</body>

</html>
